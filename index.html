<!doctype html>
<html>
<head>
<meta charset="utf-8">
<script src="dsbridge.min.js"></script>
<style>
body{
    margin:20px;
    background:#111;
    color:#00ff00;
    font-family:monospace;
}
pre{
    font-size:32px;
    white-space:pre-wrap;
    word-break:break-all;
}
</style>
</head>

<body>

<pre id="jwt">Loading...</pre>

<script>
const out = document.getElementById("jwt");

(window.dsBridge||window._dsbridge).call("getUserAuth",{},function(r){
    if(typeof r==="string") r=JSON.parse(r);
    out.textContent=r.data.authtoken;
});
</script>

</body>
</html>
